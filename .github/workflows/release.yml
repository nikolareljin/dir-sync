name: Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pyinstaller
      - name: Build executable
        run: |
          pyinstaller --noconfirm --name dir-sync --onefile --windowed src/dirsync/app.py
      - name: Package artifact
        env:
          ARTIFACT: dir-sync-${{ matrix.os }}
        run: |
          python - <<'PY'
          import os
          import shutil
          shutil.make_archive(os.environ["ARTIFACT"], "zip", "dist")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dir-sync-${{ matrix.os }}
          path: dir-sync-${{ matrix.os }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
